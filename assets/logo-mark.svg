  <!-- right figure body -->
  <path d="M75 101 V74 a15 15 0 0 1 30 0 v27 Z" fill="#F2B33D"/>
  <!-- heads -->
  <circle cx="33" cy="43" r="12.5" fill="#F2EBDF"/>
  <circle cx="61.5" cy="36" r="13.5" fill="#F2EBDF"/>
  <circle cx="90" cy="43" r="12.5" fill="#F2EBDF"/>
</svg>
